name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix engine ci

      - name: Verify no secrets in source
        shell: bash
        run: |
          matches="$(grep -RIlE "sk-[a-zA-Z0-9]{20,}" \
            --include="*.ts" --include="*.tsx" --include="*.js" \
            --include="*.json" --include="*.yml" --include="*.env*" \
            --exclude="*.test.*" --exclude="*.spec.*" \
            src/ engine/src/ scripts/ 2>/dev/null || true)"
          if [ -n "$matches" ]; then
            echo "ERROR: Potential API key found in source files:"
            echo "$matches"
            exit 1
          fi
          echo "No secrets found"

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package
        run: npx electron-builder --win --publish never

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
