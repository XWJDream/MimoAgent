name: Build & Test

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix engine ci

      - name: Verify no secrets in source
        shell: bash
        run: |
          echo "Checking for API keys..."
          matches="$(grep -RIlE "sk-[a-zA-Z0-9]{20,}" \
            --include="*.ts" \
            --include="*.tsx" \
            --include="*.js" \
            --include="*.json" \
            --include="*.yml" \
            --include="*.yaml" \
            --include="*.env*" \
            --exclude="*.test.*" \
            --exclude="*.spec.*" \
            src/ engine/src/ scripts/ 2>/dev/null || true)"
          if [ -n "$matches" ]; then
            echo "ERROR: Potential API key found in source files:"
            echo "$matches"
            exit 1
          fi
          echo "No secrets found"

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ matrix.os }}
          path: |
            dist/
            !dist/**/*.test.*
            !dist/**/*.map
            engine/dist/
            !engine/dist/**/*.test.*
            !engine/dist/**/*.live.test.*
            !engine/dist/**/*.map
          retention-days: 7
