name: Build & Test

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd engine && npm install && cd ..

      - name: Build
        run: npm run build

      - name: Verify no secrets in build
        shell: bash
        run: |
          echo "Checking for API keys..."
          # Check source files only, skip node_modules and bundled assets
          if grep -RIE "sk-[a-zA-Z0-9]{20,}" --include="*.ts" --include="*.tsx" --include="*.json" --include="*.env*" src/ engine/src/ 2>/dev/null; then
            echo "ERROR: API key found in source!"
            exit 1
          fi
          echo "No secrets found"

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/dev'
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7
