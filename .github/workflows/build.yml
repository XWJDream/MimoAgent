name: Build & Test

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          cd engine && npm install && cd ..

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify no secrets in source
        shell: bash
        run: |
          echo "Checking for API keys..."
          matches="$(grep -RIlE "sk-[a-zA-Z0-9]{20,}" \
            --include="*.ts" \
            --include="*.tsx" \
            --include="*.json" \
            --include="*.env*" \
            src/ engine/src/ 2>/dev/null || true)"
          if [ -n "$matches" ]; then
            echo "ERROR: Potential API key found in source files:"
            echo "$matches"
            exit 1
          fi
          echo "No secrets found"

      - name: Upload build artifacts
        if: github.ref == 'refs/heads/dev'
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist/
            !dist/**/*.test.*
            !dist/**/*.map
          retention-days: 7
